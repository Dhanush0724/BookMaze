<h4 class="text-center text-slate-300 text-lg font-semibold mb-4">Welcome to the Dashboard</h4>
<form class="bg-slate-800 border border-slate-700 grid grid-cols-6 gap-2 rounded-xl p-2 text-sm" (ngSubmit)="submitFeedback()">
    <h1 class="text-center text-slate-600 text-xl font-bold col-span-6">Send Feedback</h1>
    
    <!-- Feedback Textarea -->
    <textarea 
        class="bg-slate-700 text-slate-300 h-28 placeholder:text-slate-300 placeholder:opacity-50 border border-slate-600 col-span-6 resize-none outline-none rounded-lg p-2 duration-300 focus:border-slate-300" 
        placeholder="Your feedback..." 
        [(ngModel)]="feedback" 
        name="feedback"
        required>
    </textarea>

    <!-- Rating System -->
    <div class="rating col-span-6 flex justify-center">
        <input type="radio" id="star5" name="rate" [(ngModel)]="rating" value="5"/>
        <label for="star5" title="Excellent!">...</label>
        <input type="radio" id="star4" name="rate" [(ngModel)]="rating" value="4"/>
        <label for="star4" title="Great!">...</label>
        <input type="radio" id="star3" name="rate" [(ngModel)]="rating" value="3"/>
        <label for="star3" title="Good">...</label>
        <input type="radio" id="star2" name="rate" [(ngModel)]="rating" value="2"/>
        <label for="star2" title="Okay">...</label>
        <input type="radio" id="star1" name="rate" [(ngModel)]="rating" value="1"/>
        <label for="star1" title="Bad">...</label>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="col-span-2 bg-slate-700 text-slate-300 hover:border-slate-300 rounded-lg p-2">
        Submit Feedback
    </button>

    <!-- Logout Button -->
    <button type="button" class="bg-red-500 text-white font-bold py-2 px-4 rounded hover:bg-red-600 transition duration-200 col-span-2" (click)="logout()">
        Logout
    </button>
</form>
